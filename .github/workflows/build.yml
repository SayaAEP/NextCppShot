name: Build (Win98/XP)

on:
  workflow_dispatch:

# Windows 98/2000/XP compatibility build
# Uses llvm-mingw-xp 22.1.7 — patched toolchain for Win XP compatibility
# Single toolchain zip contains i686 + x86_64 targets
# - Avoids >=Vista API calls in CRT/stdlib
# - Uses msvcrt.dll (built-in on all Win versions)
# - femulated-TLS (native TLS is Vista+)
# Note: ARM targets not available in this toolchain

jobs:
  build-x86:
    name: Build x86 (Win98/XP)
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install llvm-mingw-xp 22.1.7
      run: |
        curl https://github.com/mon/llvm-mingw-xp/releases/download/llvm-mingw-xp-22.1.7/llvm-mingw-xp-22.1.7-msvcrt-x86_64.zip -o llvm-mingw.zip -L
        7z x llvm-mingw.zip -o"C:/llvm-mingw"

    - name: Install CMake and Ninja
      run: |
        choco install cmake ninja -y

    - name: Configure & Build
      run: |
        $env:PATH = "C:/llvm-mingw/bin;" + $env:PATH
        cmake -DCMAKE_BUILD_TYPE:STRING=Release `
              -DCMAKE_C_COMPILER=C:/llvm-mingw/bin/i686-w64-mingw32-gcc.exe `
              -DCMAKE_CXX_COMPILER=C:/llvm-mingw/bin/i686-w64-mingw32-g++.exe `
              -DLINK_UNICOWS=1 `
              -G Ninja -B build -S .
        cmake --build build --config Release

    - name: Move build to release folder
      run: |
        New-Item -ItemType Directory -Force release | Out-Null
        Move-Item build/CppShot.exe release/

    - name: Grab Windows 98/2000 compatibility DLLs
      run: |
        curl https://github.com/Cvolton/CppShot/releases/download/v0.4/gdiplus.dll -o release/gdiplus.dll -L
        curl https://geometrydash.eu/_other/unicows.dll -o release/unicows.dll -L

    - name: Copy used licenses
      run: |
        Copy-Item C:/llvm-mingw/LICENSE.TXT ./release/ -ErrorAction SilentlyContinue

    - name: Upload release build
      uses: actions/upload-artifact@v4
      with:
        name: cppshot-win98-x86
        path: ./release/

  build-x64:
    name: Build x86_64
    runs-on: windows-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install llvm-mingw-xp 22.1.7
      run: |
        curl https://github.com/mon/llvm-mingw-xp/releases/download/llvm-mingw-xp-22.1.7/llvm-mingw-xp-22.1.7-msvcrt-x86_64.zip -o llvm-mingw.zip -L
        7z x llvm-mingw.zip -o"C:/llvm-mingw"

    - name: Install CMake and Ninja
      run: |
        choco install cmake ninja -y

    - name: Configure & Build
      run: |
        $env:PATH = "C:/llvm-mingw/bin;" + $env:PATH
        cmake -DCMAKE_BUILD_TYPE:STRING=Release `
              -DCMAKE_C_COMPILER=C:/llvm-mingw/bin/x86_64-w64-mingw32-gcc.exe `
              -DCMAKE_CXX_COMPILER=C:/llvm-mingw/bin/x86_64-w64-mingw32-g++.exe `
              -G Ninja -B build -S .
        cmake --build build --config Release

    - name: Move build to release folder
      run: |
        New-Item -ItemType Directory -Force release | Out-Null
        Move-Item build/CppShot.exe release/

    - name: Copy used licenses
      run: |
        Copy-Item C:/llvm-mingw/LICENSE.TXT ./release/ -ErrorAction SilentlyContinue

    - name: Upload release build
      uses: actions/upload-artifact@v4
      with:
        name: cppshot-win64-x64
        path: ./release/
